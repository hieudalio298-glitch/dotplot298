name: Volume Breakout Alert

on:
  schedule:
    - cron: '30 4 * * 1-5'  # 11:30 Vietnam time (UTC+7) = 4:30 UTC, Mon-Fri
    - cron: '30 8 * * 1-5'  # 15:30 Vietnam time (UTC+7) = 8:30 UTC, Mon-Fri
  workflow_dispatch: # Manual trigger

jobs:
  scan-and-alert:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install httpx pandas numpy matplotlib vnstock supabase
      
      - name: Run Volume Alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python vnstock-live/worker/volume_alert.py
